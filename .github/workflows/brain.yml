name: brain

on:
  pull_request:
    paths:
      - 'brain/**'
      - '.github/workflows/brain.yml'
  push:
    branches: [main]
    paths:
      - 'brain/**'
      - '.github/workflows/brain.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: brain
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: brain/pyproject.toml
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check mira tests
      - name: Test
        run: pytest -q
